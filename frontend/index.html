<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T&A Screen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="splash">
    <div class="splash-logo">
      <div class="splash-letters">
        <span class="letter" style="animation-delay: 0s">T</span>
        <span class="letter" style="animation-delay: 0.15s">&</span>
        <span class="letter" style="animation-delay: 0.3s">A</span>
      </div>
      <div class="splash-line"></div>
      <div class="splash-screen-text">SCREEN</div>
    </div>
  </div>

  <header class="header">
    <h1>T&A Screen</h1>
  <p>Votre catalogue de films intelligent</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Rechercher un film..." />
    <button id="searchButton">Rechercher</button>
    <button id="resetButton">Réinitialiser</button>
  </div>
  <div class="nav-bar">
    <button id="favoritesPageBtn"> Mes favoris</button>
    <button id="recoPageBtn"> Recommandés</button>
    <button id="trendingBtn"> Tendances</button>
    <button id="historyBtn"> Historique</button>
    <button id="homeBtn"> Accueil</button>
  </div>
  </header>

  <div id="hero" class="hero"></div>

  <div class="layout">
    <aside class="sidebar">
      <h3>Humeur</h3>
      <ul class="mood-list">
        <li class="mood-tag" data-mood="bonne_humeur">Bonne humeur</li>
        <li class="mood-tag" data-mood="melancolique">Mélancolique</li>
        <li class="mood-tag" data-mood="sensations">Sensations fortes</li>
        <li class="mood-tag" data-mood="aventure">Aventure</li>
        <li class="mood-tag" data-mood="reflechi">Réfléchi</li>
      </ul>
    </aside>

    <main class="container">
      <h2 id="favoritesTitle">Mes Favoris</h2>
      <div id="favorites" class="grid"></div>

      <h2 id="recoTitle">Recommandés pour vous</h2>
      <div id="recommendations" class="grid"></div>

      <h2 id="trendingTitle">Tendances du jour</h2>
      <div id="trending" class="grid"></div>

      <h2 id="historyTitle">Historique</h2>
      <div id="history" class="grid"></div>

      <div id="movies" class="grid"></div>
    </main>
  </div>

  <div id="pagination" class="pagination">
    <button id="prevBtn">◀ Précédent</button>
    <span id="pageInfo">Page 1</span>
    <button id="nextBtn">Suivant ▶</button>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
